name: wordle tests

on:
  push:
    paths:
      - "code/games/wordle/**/*"
      - .github/workflows/wordle.yml
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: cargo run --release
        working-directory: code/games/wordle
